
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXI STORE | Recargas Free Fire</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* Fondo glow azul */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at top,#00bfff20,transparent 60%);
z-index:-1;
}

/* HEADER */
header{
text-align:center;
padding:35px 15px 10px;
}

/* LOGO RECORTADO Y CHICO */
.logo img{
width:160px; /* tamaño chico */
height:auto;
object-fit:contain;
filter:drop-shadow(0 0 15px #00bfff);
margin-bottom:10px;
}

.subtitle{
font-size:13px;
letter-spacing:2px;
color:#aaa;
}

/* CONTENEDOR */
.container{
width:92%;
max-width:1100px;
margin:30px auto;
}

/* TITULOS */
.section-title{
font-family:'Orbitron',sans-serif;
font-size:20px;
margin:50px 0 20px;
color:#00bfff;
letter-spacing:2px;
text-shadow:0 0 8px #00bfff;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
gap:18px;
}

/* CARD */
.card{
background:linear-gradient(145deg,#0a0f1a,#05080f);
border:1px solid #0f2a40;
padding:20px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border:1px solid #00bfff;
box-shadow:0 0 20px #00bfff40;
}

.card h3{
font-family:'Orbitron';
font-size:17px;
margin-bottom:8px;
}

.price{
font-size:19px;
font-weight:700;
color:#00d4ff;
margin-bottom:12px;
}

/* BOTON */
button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00bfff,#008cff);
color:white;
font-weight:700;
cursor:pointer;
transition:0.3s;
font-family:'Orbitron';
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 12px #00bfff;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:#0a0f1a;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
border:1px solid #00bfff;
}

.modal-content h3{
font-family:'Orbitron';
margin-bottom:10px;
color:#00d4ff;
}

input,select{
width:100%;
padding:8px;
margin-top:10px;
border-radius:8px;
border:1px solid #0f2a40;
background:#000;
color:white;
}

.close{
text-align:right;
cursor:pointer;
color:#aaa;
margin-bottom:8px;
font-size:14px;
}

/* Footer */
footer{
text-align:center;
margin:50px 0 20px;
font-size:12px;
color:#555;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo1.png" alt="MAXI STORE">
</div>
<div class="subtitle">RECARGAS FREE FIRE • ENTREGA INMEDIATA ⚡</div>
</header>

<div class="container">

<div class="section-title">💎 DIAMANTES STOCK</div>
<div class="grid">
<div class="card"><h3>110 💎</h3><div class="price">$1230</div><button onclick="abrirModal('110 💎 STOCK','1230')">COMPRAR</button></div>
<div class="card"><h3>341 💎</h3><div class="price">$3700</div><button onclick="abrirModal('341 💎 STOCK','3700')">COMPRAR</button></div>
<div class="card"><h3>572 💎</h3><div class="price">$5500</div><button onclick="abrirModal('572 💎 STOCK','5500')">COMPRAR</button></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<div class="close" onclick="cerrarModal()">Cerrar ✖</div>
<h3>FINALIZAR PEDIDO</h3>
<p id="productoSeleccionado"></p>
<input type="text" id="playerID" placeholder="Ingrese ID del jugador">
<select id="metodoPago">
<option value="">Método de pago</option>
<option>Transferencia</option>
<option>Mercado Pago</option>
<option>USDT</option>
</select>
<button onclick="enviarPedido()">ENVIAR PEDIDO</button>
</div>
</div>

<footer>
© 2026 MAXI STORE
</footer>

<script>
let producto="";
let precio="";

function abrirModal(prod,pre){
producto=prod;
precio=pre;
document.getElementById("productoSeleccionado").innerHTML=
"<strong>Producto:</strong> "+prod+"<br><strong>Precio:</strong> $"+pre;
document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
document.getElementById("modal").style.display="none";
}

function enviarPedido(){
let id=document.getElementById("playerID").value;
let metodo=document.getElementById("metodoPago").value;

if(id===""||metodo===""){
alert("Complete todos los campos");
return;
}

let mensaje=
"🛒 NUEVO PEDIDO MAXI STORE\n\n"+
"💎 Producto: "+producto+"\n"+
"💵 Precio: $"+precio+"\n"+
"🆔 ID: "+id+"\n"+
"💳 Pago: "+metodo;

let numero="5493865267742"; // Cambia por tu número
let url="https://wa.me/"+numero+"?text="+encodeURIComponent(mensaje);

window.open(url,'_blank');
}
</script>

</body>
</html>
